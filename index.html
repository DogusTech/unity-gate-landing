<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unity Gate App | Yükleniyor...</title>

  <!-- 🚫 SEO İPTAL: Google'ın bu App (Uygulama) sayfasını indekslemesini istemiyoruz! -->
  <meta name="robots" content="noindex, nofollow">

  <!-- PWA ve Tema Ayarları -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1121">

  <style>
    /* 🚀 SADECE UYGULAMA YÜKLENİRKEN GÖRÜNECEK PREMIUM TASARIM */
    body {
      margin: 0;
      background-color: #0B1121; /* Aeternexus Gece Mavisi */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 229, 255, 0.1);
      border-top: 3px solid #00E5FF; /* Turkuaz Vurgu */
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    .brand-text {
      margin-top: 24px;
      color: #00E5FF;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- YÜKLEME EKRANI -->
  <div id="loader">
    <div class="spinner"></div>
    <div class="brand-text">UNITY GATE</div>
  </div>

  <!-- FLUTTER MOTORUNU BAŞLATAN KOD (SİLİNMEMELİ) -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter ilk kareyi çizdiğinde (uygulama açıldığında) loader'ı zarifçe yok et
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.opacity = '0'; // Yumuşakça kaybolur
        setTimeout(() => {
          loader.style.display = 'none'; // DOM'dan tamamen kaldırılır
        }, 600); 
      }
    });
  </script>

</body>
</html>
