<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Uzman Girişi | Unity Gate</title>
    
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/i18next/i18next.min.js" defer></script>
</head>
<body style="background-color: var(--color-bg-deep);">

  <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 100px 5% 60px; position: relative; overflow: hidden;">
    <div style="position: absolute; bottom: 10%; left: 10%; width: 50vw; height: 50vw; background: rgba(222, 189, 166, 0.08); filter: blur(120px); z-index: 0; pointer-events: none; border-radius: 50%;"></div>

    <div class="glass-panel" style="position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 3rem;">
      <a href="/tr/index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); text-decoration: none; font-weight: 500; margin-bottom: 2rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Ana Sayfa
      </a>

      <div style="text-align: center; margin-bottom: 2.5rem;">
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Uzman Girişi</h1>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Profesyonel ağınıza hoş geldiniz. Danışanlarınıza rehberlik etmeye devam edin.</p>
      </div>

      <form id="expert-login-form" onsubmit="handleLogin(event)">
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem;">Kurumsal E-posta</label>
          <input type="email" id="expert_login_email" style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: #fff; font-family: var(--font-body);" required placeholder="iletisim@klinik.com">
        </div>

        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem;">Güvenli Şifre</label>
          <input type="password" id="expert_login_password" style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: #fff; font-family: var(--font-body);" required placeholder="••••••••">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary);">
            <input type="checkbox" id="remember_me" style="width: 16px; height: 16px; accent-color: var(--color-accent-warm);">
            Beni Hatırla
          </label>
          <a href="#" style="color: var(--color-accent-warm); text-decoration: none; font-weight: 500;">Şifremi Unuttum</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-bottom: 1.5rem;">Klinik Panele Giriş</button>

        <div style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
          Uzman ağımıza katılmadınız mı? <br>
          <a href="/tr/expert-registration.html" style="color: #fff; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 0.5rem;">Uzman Olarak Başvurun</a>
        </div>
      </form>
    </div>
  </main>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-primary');
      btn.innerHTML = 'Kimlik Doğrulanıyor...';
      btn.style.opacity = '0.8';
      
      setTimeout(() => {
          const params = new URLSearchParams();
          params.append("email", document.getElementById('expert_login_email').value);
          params.append("token", document.getElementById('expert_login_password').value);
          window.location.href = `https://app.unity-gate.com/expert-login/auth?${params.toString()}`;
      }, 500);
    }
  </script>
</body>
</html>
