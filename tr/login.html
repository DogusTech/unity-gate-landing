<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kullanıcı Girişi | Unity Gate</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'unity-base': '#1A292F',    
                        'unity-surface': '#23353D', 
                        'unity-taupe': '#DEBDA6',   
                        'unity-sand': '#B8C5CB',    
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['system-ui', '-apple-system', 'sans-serif'], 
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans selection:bg-unity-taupe selection:text-unity-base bg-unity-base text-unity-sand min-h-screen flex flex-col items-center justify-center py-16 px-6 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-[#6B8E99]/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="w-full max-w-md mb-8 relative z-20">
        <a href="index.html" class="inline-flex items-center gap-2 text-unity-sand hover:text-white transition-transform transform hover:-translate-x-1 duration-300 font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            <span data-i18n="authBackHome">Ana Sayfaya Dön</span>
        </a>
    </div>

    <div class="relative z-10 w-full max-w-md bg-unity-surface/80 backdrop-blur-xl p-8 md:p-12 rounded-[2rem] border border-white/10 shadow-2xl">
        
        <div class="text-center mb-10">
            <div class="w-12 h-12 mx-auto rounded-xl bg-gradient-to-br from-unity-taupe to-white flex items-center justify-center shadow-lg mb-6">
                <svg class="w-6 h-6 text-unity-base" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2 font-display" data-i18n="loginTitle">Kullanıcı Girişi</h1>
            <p class="font-light text-unity-sand/80" data-i18n="loginDesc">Güvenli alanınıza hoş geldiniz. İyileşme yolculuğunuza devam edin.</p>
        </div>

        <form id="login-form" onsubmit="handleUserLogin(event)">
            <div class="mb-6">
                <label for="email" class="block text-xs font-semibold text-unity-sand/60 tracking-wider mb-2" data-i18n="lblEmail">E-POSTA ADRESİ</label>
                <input type="email" id="email" class="w-full bg-unity-base/50 border border-white/10 rounded-xl px-4 py-3.5 text-white placeholder-unity-sand/30 focus:outline-none focus:border-unity-taupe focus:ring-1 focus:ring-unity-taupe transition-all duration-300" required placeholder="ornek@mail.com">
            </div>

            <div class="mb-6">
                <label for="password" class="block text-xs font-semibold text-unity-sand/60 tracking-wider mb-2" data-i18n="lblPassword">ŞİFRE</label>
                <input type="password" id="password" class="w-full bg-unity-base/50 border border-white/10 rounded-xl px-4 py-3.5 text-white placeholder-unity-sand/30 focus:outline-none focus:border-unity-taupe focus:ring-1 focus:ring-unity-taupe transition-all duration-300" required placeholder="••••••••">
            </div>

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="remember_me" class="w-4 h-4 rounded border-white/20 bg-unity-base/50 text-unity-taupe focus:ring-unity-taupe focus:ring-offset-unity-surface">
                    <span class="text-sm font-medium text-unity-sand group-hover:text-white transition-colors" data-i18n="lblRemember">Beni Hatırla</span>
                </label>
                <a href="forgot-password.html" class="text-sm font-medium text-unity-taupe hover:text-white transition-colors" data-i18n="lblForgotPwd">Şifrenizi mi unuttunuz?</a>
            </div>

            <button type="submit" class="w-full bg-unity-taupe text-unity-base py-4 rounded-full font-bold text-lg hover:bg-white transition-all duration-300 transform hover:-translate-y-0.5 shadow-lg" data-i18n="btnLoginSubmit">
                Güvenli Giriş Yap
            </button>

            <div class="mt-8 text-center text-sm font-medium">
                <span class="text-unity-sand/60" data-i18n="loginNoAccount">Hesabınız yok mu?</span> 
                <a href="register.html" class="text-white hover:text-unity-taupe transition-colors ml-1" data-i18n="loginGoRegister">Hemen Kayıt Olun</a>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 flex items-center justify-center gap-2 text-xs font-medium text-unity-sand/50">
            <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"/></svg>
            <span data-i18n="authSecureBadge">Bağlantınız Askeri Düzeyde Uçtan Uca Şifrelenmiştir</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('tr.json')
                .then(response => response.json())
                .then(translations => {
                    document.querySelectorAll('[data-i18n]').forEach(element => {
                        const key = element.getAttribute('data-i18n');
                        if (translations[key]) element.innerHTML = translations[key];
                    });
                });
        });

        function handleUserLogin(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerHTML = 'Doğrulanıyor...';
            submitBtn.style.opacity = '0.7';
            
            setTimeout(() => {
                // Giriş başarılı varsayılarak Dashboard'a yönlendiriliyor
                window.location.href = 'dashboard.html';
            }, 800); 
        }
    </script>
</body>
</html>
