<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Kullanıcı Girişi | Unity Gate</title>
    <meta name="description" content="Unity Gate'e güvenli giriş yaparak iyileşme yolculuğunuza kaldığınız yerden devam edin.">
    
    <link rel="stylesheet" href="/style.css">
    
    <script src="https://unpkg.com/i18next/i18next.min.js" defer></script>
    <script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js" defer></script>

    <style>
        /* Sadece bu sayfaya özel yerleşim (Layout) stilleri */
        .auth-layout {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            position: relative; padding: 100px 5% 60px 5%; overflow: hidden;
        }
        .form-control {
            width: 100%; padding: 1rem 1.25rem; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md); 
            color: #fff; font-family: var(--font-body); transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .form-control:focus {
            outline: none; border-color: var(--color-accent-warm);
            box-shadow: 0 0 0 4px rgba(222, 189, 166, 0.15); background: rgba(0, 0, 0, 0.4);
        }
        .auth-helpers { 
            display: flex; justify-content: space-between; align-items: center; 
            margin: 1.5rem 0; font-size: 0.9rem; 
        }
        .back-link {
            position: absolute; top: 40px; left: 5%; display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: 0.3s;
        }
        .back-link:hover { color: #fff; transform: translateX(-5px); }
    </style>
</head>
<body>

    <main class="auth-layout">
        <div style="position: absolute; top: 10%; left: 15%; width: 50vw; height: 50vw; background: rgba(107, 142, 153, 0.15); filter: blur(120px); z-index: 0; pointer-events: none; border-radius: 50%;"></div>

        <a href="/tr/index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Ana Sayfa
        </a>

        <div class="glass-panel" style="position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 3rem;">
            
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Kullanıcı Girişi</h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Güvenli alanınıza hoş geldiniz. İyileşme yolculuğunuza devam edin.</p>
            </div>

            <form id="login-form" onsubmit="handleUserLogin(event)">
                <div style="margin-bottom: 1.5rem;">
                    <label for="email" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">E-posta Adresi</label>
                    <input type="email" id="email" class="form-control" required placeholder="ornek@mail.com">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label for="password" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Şifre</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="auth-helpers">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary);">
                        <input type="checkbox" id="remember_me" style="width: 16px; height: 16px; accent-color: var(--color-accent-warm);">
                        Beni Hatırla
                    </label>
                    <a href="https://app.unity-gate.com/forgot-password" style="color: var(--color-accent-warm); text-decoration: none; font-weight: 500;">Şifremi Unuttum</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Giriş Yap</button>

                <div style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
                    Hesabınız yok mu? <a href="/tr/register.html" style="color: #fff; font-weight: 600; text-decoration: none; margin-left: 5px;">Kayıt Olun</a>
                </div>
            </form>

            <div class="trust-badge-container" style="justify-content: center; margin-top: 2.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Bağlantınız Uçtan Uca Şifrelenmiştir</span>
            </div>
        </div>
    </main>

    <script>
        function handleUserLogin(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('.btn-primary');
            submitBtn.innerHTML = 'Güvenli Giriş Yapılıyor...';
            submitBtn.style.opacity = '0.8';
            
            setTimeout(() => {
                const email = document.getElementById('email').value;
                const rawPassword = document.getElementById('password').value; 
                const rememberMe = document.getElementById('remember_me').checked;

                const params = new URLSearchParams();
                params.append("email", email);
                params.append("token", rawPassword); 
                params.append("remember", rememberMe);

                window.location.href = `https://app.unity-gate.com/user-login/auth?${params.toString()}`;
            }, 500); 
        }
    </script>
</body>
</html>
