<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Klinik İçgörüler | Unity Gate</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header style="padding: 1.5rem 5%; border-bottom: 1px solid var(--glass-border);">
    <div style="font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--text-primary);">Unity Gate</div>
  </header>

  <main style="padding: 6rem 5%; max-width: 1200px; margin: 0 auto;">
    
    <div style="text-align: center; margin-bottom: 5rem;">
      <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1rem;">Klinik İçgörüler</h1>
      <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 650px; margin: 0 auto;">Ruh sağlığı, modern yalnızlık krizleri ve bilimsel iyileşme üzerine derinlemesine analizler kütüphanesi.</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem;">
      
      <a href="#" class="glass-panel" style="padding: 0; text-decoration: none; overflow: hidden; display: flex; flex-direction: column;">
        <div style="width: 100%; aspect-ratio: 16/9; overflow: hidden; border-bottom: 1px solid var(--glass-border);">
          <img src="https://images.unsplash.com/photo-1499209974431-9dddcece7f88?q=80&w=600&auto=format&fit=crop" style="width: 100%; height: 100%; object-fit: cover;" alt="Makale Görseli">
        </div>
        <div style="padding: 2rem 1.5rem;">
          <div style="display: flex; gap: 1rem; margin-bottom: 1rem; font-size: 0.85rem; font-weight: 700; text-transform: uppercase;">
            <span style="color: var(--color-accent-warm);">Psikoloji</span>
            <span style="color: var(--text-tertiary);">5 dk okuma</span>
          </div>
          <h3 style="font-size: 1.25rem; color: #fff; margin-bottom: 1rem; line-height: 1.4;">Modern Yalnızlık ve Bağ Kurma Zorlukları</h3>
        </div>
      </a>

    </div>
  </main>

</body>
</html>
