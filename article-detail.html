<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Makale | Unity Gate</title>
    <meta name="description" content="Unity Gate İçgörüler - Ruh sağlığı ve modern yaşam üzerine derinlemesine analizler.">
    <meta name="theme-color" content="#0B1121">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/i18next/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>

    <style>
        :root {
            --bg-dark: #0B1121;
            --bg-card: #1E293B;
            --cyan: #00E5FF;
            --text-main: #F8FAFC;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Navbar & Akıllı Geri Butonu */
        header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 24px 5%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }

        .back-btn {
            background: rgba(11, 17, 33, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn:hover { background: rgba(0, 229, 255, 0.2); border-color: var(--cyan); }

        /* Hero Görseli */
        .hero-image {
            width: 100%;
            height: 500px;
            background-color: var(--bg-card);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .hero-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--bg-dark) 100%);
        }

        /* İçerik Alanı */
        .article-container {
            max-width: 900px;
            margin: -100px auto 0;
            padding: 0 40px;
            position: relative;
            z-index: 2;
        }

        .meta-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .tag {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--cyan);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .read-time { color: rgba(255, 255, 255, 0.54); font-size: 14px; }

        h1#article-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 40px;
        }

        .divider { height: 1px; background: rgba(255, 255, 255, 0.1); margin: 40px 0; }

        /* Markdown Stilleri */
        .markdown-body h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px; margin: 40px 0 20px 0; }
        .markdown-body h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; color: var(--cyan); margin: 30px 0 15px 0; }
        .markdown-body p { font-size: 18px; color: rgba(255, 255, 255, 0.85); margin-bottom: 24px; }
        .markdown-body blockquote { border-left: 4px solid var(--cyan); padding-left: 20px; margin: 30px 0; font-style: italic; color: var(--text-muted); background: rgba(0, 229, 255, 0.03); padding: 20px; border-radius: 0 8px 8px 0; }
        .markdown-body ul { margin-left: 24px; margin-bottom: 24px; color: rgba(255, 255, 255, 0.85); font-size: 18px; }
        .markdown-body li::marker { color: var(--cyan); }

        /* Son Makaleler */
        .latest-insights { margin-top: 80px; padding-bottom: 80px; }
        .latest-insights h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; margin-bottom: 24px; }

        .carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan) var(--bg-card);
        }

        .carousel::-webkit-scrollbar { height: 6px; }
        .carousel::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }

        .insight-card {
            min-width: 300px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            transition: 0.3s;
        }

        .insight-card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        .insight-card img { width: 100%; height: 160px; object-fit: cover; }
        .insight-content { padding: 20px; }
        .insight-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; }
        .insight-meta .cat { color: var(--cyan); font-weight: bold; letter-spacing: 1px; }
        .insight-meta .time { color: rgba(255,255,255,0.54); }
        .insight-card h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; color: white; line-height: 1.4; }

        @media (max-width: 800px) {
            .hero-image { height: 350px; }
            .article-container { padding: 0 24px; margin-top: -60px; }
            h1#article-title { font-size: 32px; }
            .markdown-body p { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/insights.html" class="back-btn" id="back-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span data-i18n="btnBack">Geri Dön</span>
        </a>
    </header>

    <div class="hero-image" id="hero-bg"></div>

    <main class="article-container">
        <div class="meta-info">
            <span class="tag" id="article-category">...</span>
            <span class="read-time" id="article-time">...</span>
        </div>
        
        <h1 id="article-title">Yükleniyor...</h1>
        
        <div class="divider"></div>
        
        <article class="markdown-body" id="article-content">
            <!-- Makale gövdesi buraya gelecek -->
        </article>

        <div class="divider"></div>

        <section class="latest-insights">
            <h2 data-i18n="latestArticlesTitle">Son Makaleler</h2>
            <div class="carousel" id="latest-carousel">
                <!-- Carousel içerikleri buraya gelecek -->
            </div>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let urlLang = urlParams.get('lang') || navigator.language.split('-')[0];
        
        if(!['en', 'tr', 'de', 'fr', 'es', 'ja'].includes(urlLang)) {
            urlLang = 'tr'; 
        }

        const requestedSlug = urlParams.get('slug');

        i18next
            .use(i18nextHttpBackend)
            .init({
                lng: urlLang,
                fallbackLng: 'en',
                backend: {
                    loadPath: './locales/{{lng}}/translation.json' 
                }
            }).then(function() {
                // UI Static Elementlerini Çevir (Geri dön, Son makaleler vs.)
                document.querySelectorAll('[data-i18n]').forEach(element => {
                    element.innerHTML = i18next.t(element.getAttribute('data-i18n'));
                });
                document.getElementById('html-tag').setAttribute('lang', i18next.language);
                
                // Makale verilerini JSON'dan çek
                renderArticle();
            }).catch(function(error) {
                console.error("i18next yüklenirken hata oluştu: ", error);
            });

        function renderArticle() {
            // translation.json içindeki articleDetails objesini getir
            const articleDetails = i18next.t('articleDetails', { returnObjects: true });
            const minReadTxt = i18next.t('minRead');

            // Eğer girilen slug yoksa veya hatalıysa, objeden ilk makaleyi aç
            let activeSlug = requestedSlug;
            if (!activeSlug || !articleDetails[activeSlug]) {
                activeSlug = Object.keys(articleDetails)[0];
            }

            const articleData = articleDetails[activeSlug];

            // 1. Ana Makale İçeriğini Doldur
            document.title = `${articleData.title} | Unity Gate`;
            document.getElementById('hero-bg').style.backgroundImage = `url('${articleData.img}')`;
            document.getElementById('article-category').innerText = articleData.cat.toUpperCase();
            document.getElementById('article-time').innerText = `${articleData.time} ${minReadTxt}`;
            document.getElementById('article-title').innerText = articleData.title;
            document.getElementById('article-content').innerHTML = articleData.body;

            // 2. Alt Kısımdaki (Son Makaleler) Carousel'i Doldur
            const carousel = document.getElementById('latest-carousel');
            carousel.innerHTML = '';
            
            Object.keys(articleDetails).forEach(key => {
                if (key !== activeSlug) { // Açık olan makaleyi aşağıda gösterme
                    const item = articleDetails[key];
                    const targetUrl = `/article-detail.html?slug=${key}&lang=${i18next.language}`;
                    
                    carousel.innerHTML += `
                        <a href="${targetUrl}" class="insight-card">
                            <img src="${item.img}" alt="${item.title}" loading="lazy">
                            <div class="insight-content">
                                <div class="insight-meta">
                                    <span class="cat">${item.cat.toUpperCase()}</span>
                                    <span class="time">${item.time} ${minReadTxt}</span>
                                </div>
                                <h3>${item.title}</h3>
                            </div>
                        </a>
                    `;
                }
            });
        }

        // Akıllı Geri Butonu Mantığı
        document.getElementById('back-button').addEventListener('click', function(e) {
            e.preventDefault();
            if (window.history.length > 2) {
                window.history.back();
            } else {
                window.location.href = `/insights.html?lang=${i18next.language}`;
            }
        });
    </script>
</body>
</html>
