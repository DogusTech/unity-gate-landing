<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="metaTitleInsights">İçgörüler | Unity Gate</title>
    <meta name="description" data-i18n="[content]metaDescInsights" content="Yalnızlık, psikoloji ve modern ilişkiler üzerine analizler.">
    
    <!-- Global SEO Hreflang Etiketleri -->
    <link rel="alternate" hreflang="en" href="https://unity-gate.com/en/insights" />
    <link rel="alternate" hreflang="tr" href="https://unity-gate.com/tr/insights" />
    <link rel="alternate" hreflang="de" href="https://unity-gate.com/de/insights" />
    <link rel="alternate" hreflang="fr" href="https://unity-gate.com/fr/insights" />
    <link rel="alternate" hreflang="es" href="https://unity-gate.com/es/insights" />
    <link rel="alternate" hreflang="ja" href="https://unity-gate.com/ja/insights" />
    <link rel="alternate" hreflang="x-default" href="https://unity-gate.com/en/insights" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- i18next Kütüphaneleri -->
    <script src="https://unpkg.com/i18next/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend/i18nextHttpBackend.min.js"></script>

    <style>
        :root {
            --bg-dark: #0B1121;
            --bg-card: #162032;
            --cyan: #00E5FF;
            --blue: #0284C7;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navbar - Landing Page ile Aynı Standart */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 16px 80px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 17, 33, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .brand { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 12px; color: white; text-decoration: none;}
        .nav-links { display: flex; gap: 24px; font-weight: 600; font-size: 14px; color: var(--text-muted); }
        .nav-links a { color: inherit; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--cyan); }
        
        /* Hero Section */
        .hero { padding: 140px 15% 80px 15%; text-align: left; position: relative; }
        .hero h1 { font-size: 48px; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; }
        .hero p { font-size: 18px; color: var(--text-muted); max-width: 700px; margin-bottom: 32px; }

        .btn-ucla {
            background: #2563EB; color: white; padding: 16px 32px; border-radius: 8px;
            font-weight: 600; text-decoration: none; display: inline-block; transition: 0.3s;
        }
        .btn-ucla:hover { background: #1D4ED8; transform: translateY(-2px); }

        /* Article Grid */
        .container { padding: 0 15% 80px 15%; }
        .section-title { font-size: 24px; color: var(--text-muted); border-bottom: 1px solid var(--bg-card); padding-bottom: 12px; margin-bottom: 40px; }

        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .article-card {
            background: rgba(30, 41, 59, 0.5); border: 1px solid var(--bg-card); border-radius: 12px;
            overflow: hidden; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .article-card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        .article-card img { width: 100%; height: 220px; object-fit: cover; }
        .article-content { padding: 24px; }
        .meta { display: flex; gap: 12px; font-size: 12px; font-weight: bold; margin-bottom: 12px; }
        .category { color: var(--cyan); letter-spacing: 1px; }
        .read-time { color: var(--text-muted); }
        .article-card h3 { font-size: 20px; font-weight: 700; color: white; line-height: 1.3; }

        /* Wave Effect */
        .wave-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; overflow: hidden; line-height: 0; z-index: -1; opacity: 0.5;}
        .wave-container svg { height: 100%; width: 200%; animation: moveWave 15s linear infinite; fill: var(--cyan); }
        @keyframes moveWave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        @media (max-width: 800px) {
            header { padding: 16px 24px; }
            .nav-links { display: none; }
            .hero { padding: 120px 24px 60px 24px; }
            .hero h1 { font-size: 32px; }
            .container { padding: 0 24px 60px 24px; }
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-left">
        <a href="/" class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Unity Gate
        </a>
        <nav class="nav-links">
            <a href="/ucla-test" data-i18n="navUcla">UCLA Testi</a>
            <a href="/insights" class="active" data-i18n="navInsights">İçgörüler</a>
            <a href="/about" data-i18n="navAbout">Hakkımızda</a>
        </nav>
    </div>
</header>

<section class="hero">
    <h1 data-i18n="insightsTitle">İçgörüler</h1>
    <p data-i18n="insightsSubtitle">Ruh sağlığı, modern yalnızlık ve bilimsel iyileşme üzerine derinlemesine analizler.</p>
    <a href="/ucla-test/start" class="btn-ucla" data-i18n="btnStartTest">Yalnızlık Testini Başlat</a>
    
    <div class="wave-container">
        <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" />
        </svg>
    </div>
</section>

<div class="container">
    <h2 class="section-title" data-i18n="articlesSection">Son Makaleler</h2>
    <div class="article-grid" id="article-container">
        <!-- Makaleler JavaScript ile buraya i18next üzerinden dinamik basılacak -->
    </div>
</div>

<script>
    const pathSegments = window.location.pathname.split('/');
    let urlLang = pathSegments[1]; 
    if(!['en', 'tr', 'de', 'fr', 'es', 'ja'].includes(urlLang)) {
        urlLang = 'tr'; 
    }

    i18next
        .use(i18nextHttpBackend)
        .init({
            lng: urlLang,
            fallbackLng: 'en',
            backend: {
                loadPath: './locales/{{lng}}/translation.json' 
            }
        }).then(function() {
            // 1. Statik Metinleri Çevir
            updateStaticContent();
            document.getElementById('html-tag').setAttribute('lang', i18next.language);
            
            // 2. Makaleleri Array (Dizi) olarak Çek ve Render Et
            renderArticles();
        }).catch(function(error) {
            console.error("i18next yüklenirken bir hata oluştu: ", error);
        });

    function updateStaticContent() {
        document.querySelectorAll('[data-i18n]').forEach(element => {
            const key = element.getAttribute('data-i18n');
            if (key.startsWith('[content]')) {
                element.setAttribute('content', i18next.t(key.replace('[content]', '')));
            } else {
                element.innerHTML = i18next.t(key);
            }
        });
    }

    function renderArticles() {
        // Çeviri dosyasından 'articles' dizisini obje olarak alıyoruz
        const articles = i18next.t('articles', { returnObjects: true });
        const minReadTxt = i18next.t('minRead'); // "dk okuma" vb.
        
        const container = document.getElementById('article-container');
        container.innerHTML = '';

        if (Array.isArray(articles)) {
            articles.forEach(art => {
                // Tıklanan makale için slug'ı ve dili URL'e paslıyoruz
                const targetUrl = `/article-detail.html?slug=${art.slug}&lang=${i18next.language}`;
                
                const card = `
                    <a href="${targetUrl}" class="article-card">
                        <img src="${art.img}" alt="${art.title}" loading="lazy">
                        <div class="article-content">
                            <div class="meta">
                                <span class="category">${art.cat}</span>
                                <span class="read-time">${art.time} ${minReadTxt}</span>
                            </div>
                            <h3>${art.title}</h3>
                        </div>
                    </a>
                `;
                container.innerHTML += card;
            });
        }
    }
</script>

</body> 
</html>
